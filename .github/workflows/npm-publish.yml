# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish Package to npmjs

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: 安装 node
        uses: actions/setup-node@v3
        with:
          node-version: 16.14.x
          cache: yarn

      - name: 获取 package.json 的name和version
        run: |
          echo "NPM_PACKAGE_NAME=$(node -p 'require("./package.json").name')" >> $GITHUB_ENV
          echo "NPM_PACKAGE_VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_ENV
      
      - run: yarn install
      - run: yarn lint
      - run: yarn test

  publish-npm:
    if: contains("$(npm view ${{ env.NPM_PACKAGE_NAME }} versions)", ${{ env.NPM_PACKAGE_VERSION }})
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16
          registry-url: https://registry.npmjs.org/
          
      - run: echo ${{env.NPM_PACKAGE_NAME}}
      - name: Install
        run: yarn
      - name: Build lib
        run: |
          yarn build:lib
          yarn build:lib-notebook
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
