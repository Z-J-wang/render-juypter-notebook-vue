name: Workflow test
run-name: ${{ github.actor }} running lint action by ${{ github.event_name }}
on:
  push:
  workflow_dispatch:
  
jobs:
  pre:
    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.allow-publish.outputs.allow }}
    steps:
      - uses: actions/checkout@v3
      - run: |
          echo "NPM_PACKAGE_NAME=$(node -p 'require("./package.json").name')" >> $GITHUB_ENV
          echo "NPM_PACKAGE_VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_ENV
      - run: echo "${{ env.NPM_PACKAGE_NAME} }}"
      - name: 判断是否可以发布npm包
        id: allow-publish
        run: |
          if [[ "$(npm view ${env.NPM_PACKAGE_NAME} versions)" != *"'${env.NPM_PACKAGE_VERSION}'"* ]]; then
            echo "allow=true" >> $GITHUB_OUTPUT
          else
            echo "allow=false" >> $GITHUB_OUTPUT
          fi
          
  lint-test:
    needs: pre
    if: needs.pre.outputs.output1 == true
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v3
      - run: echo ${{needs.pre.outputs.output1}}
  publish:
    needs: [lint-test,pre]
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v3
      - run: echo ${{needs.pre.outputs.output1}}

  

