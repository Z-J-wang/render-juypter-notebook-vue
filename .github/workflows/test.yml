name: Workflow test
run-name: ${{ github.actor }} running lint action by ${{ github.event_name }}
on:
  push:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with: 
          node-version: 16
      - run: |
          echo "NPM_PACKAGE_NAME=$(node -p 'require("./package.json").name')" >> $GITHUB_ENV
          echo "NPM_PACKAGE_VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_ENV
          
      - run: echo "NPM_PACKAGE_VERSIONS='npm view ${{env.NPM_PACKAGE_NAME}} versions'" >> $GITHUB_ENV
      - run: echo $(env.NPM_PACKAGE_VERSIONS)
#       - name: test
#         if: ${{ contains($(env.NPM_PACKAGE_VERSIONS), env.NPM_PACKAGE_VERSION) }}
#         run: echo ${{env.NPM_PACKAGE_VERSION}}
  

