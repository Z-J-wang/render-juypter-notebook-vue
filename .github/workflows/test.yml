name: Workflow test
run-name: ${{ github.actor }} running lint action by ${{ github.event_name }}
on:
  push:
  workflow_dispatch:
  
jobs:
  pre:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: |
          echo "NPM_PACKAGE_NAME=$(node -p 'require("./package.json").name')" >> $GITHUB_ENV
          echo "NPM_PACKAGE_VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_ENV
          
      - name: 判断是否可以发布npm包
        id: allow-publish
        run: |
          if [[ "$(npm view ${NPM_PACKAGE_NAME} versions)" != *"'${NPM_PACKAGE_VERSION}'"* ]]; then
            echo "allow=true" >> $GITHUB_OUTPUT
          else
            echo "allow=false" >> $GITHUB_OUTPUT
          fi
          
  lint-test:
    needs: pre
    if: steps.allow-publish.outputs.allow == true 
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v3
      - name: 安装 node
        uses: actions/setup-node@v3
        with:
          node-version: 16.14.x
          cache: yarn
      - run: yarn install
      - run: yarn lint
      - run: yarn test

  

